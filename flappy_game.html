<!DOCTYPE html>
<html>
<head>
  <title>Flappy Bird Pro Mini</title>
  <style>
    body { margin:0; overflow:hidden; background:#70c5ce; font-family:Arial; text-align:center; }
    canvas { display:block; margin:0 auto; background:#70c5ce; }
    #startBtn, #restartBtn {
      position:absolute;
      left:50%; transform:translateX(-50%);
      padding:10px 20px;
      font-size:18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }
    #startBtn { top:45%; }
    #restartBtn { top:55%; display:none; }
  </style>
</head>
<body>

<button id="startBtn">Start Game</button>
<button id="restartBtn">Restart</button>
<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, frame, score, gameRunning;

function resetGame() {
  bird = {
    x: 80,
    y: 200,
    size: 20,
    gravity: 0.5,
    lift: -8,
    velocity: 0
  };
  pipes = [];
  frame = 0;
  score = 0;
}

function drawBird() {
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, bird.size, bird.size);
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, 40, p.top);
    ctx.fillRect(p.x, p.bottom, 40, canvas.height);
  });
}

function updatePipes() {
  if (frame % 90 === 0) {
    let top = Math.random() * 200 + 50;
    let gap = 130;
    pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed:false });
  }

  pipes.forEach(p => {
    p.x -= 2;

    if (
      bird.x < p.x + 40 &&
      bird.x + bird.size > p.x &&
      (bird.y < p.top || bird.y + bird.size > p.bottom)
    ) {
      endGame();
    }

    if (!p.passed && p.x < bird.x) {
      score++;
      p.passed = true;
    }
  });

  pipes = pipes.filter(p => p.x > -40);
}

function updateBird() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y + bird.size > canvas.height || bird.y < 0) {
    endGame();
  }
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);
}

function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBird();
  drawPipes();
  updateBird();
  updatePipes();
  drawScore();

  frame++;
  requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  resetGame();
  gameRunning = true;
  loop();
}

function endGame() {
  gameRunning = false;
  document.getElementById("restartBtn").style.display = "block";
  alert("Game Over! Score: " + score);
}

window.addEventListener("keydown", (e) => {
  if (e.code === "Space") bird.velocity = bird.lift;
});

window.addEventListener("touchstart", () => {
  bird.velocity = bird.lift;
});

document.getElementById("startBtn").onclick = startGame;
document.getElementById("restartBtn").onclick = startGame;

</script>
</body>
</html>
